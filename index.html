<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRE BOOKING - Artist Agency</title>
    <link rel="icon" type="image/png" href="./images/webtop.png">
    <link rel="shortcut icon" type="image/png" href="./images/webtop.png">
    <link rel="apple-touch-icon" href="./images/webtop.png">
    <style>
        :root {
            --xre-red: #ff0000;
            --xre-dark-red: #8b0000;
            --mad-silver: #e8e8e8;
            --mad-light: #f5f5f5;
            --black: #050505;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: auto; }
        body {
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            background-color: var(--black);
            color: #fff;
            overflow-x: hidden;
        }
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            padding: 0 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.5);
        }
        .logo-img {
            height: 45px;
            width: auto;
            max-width: 200px;
            object-fit: contain;
            cursor: pointer;
            animation: logoBreathe 4s ease-in-out infinite;
        }
        @keyframes logoBreathe {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(139, 0, 0, 0.4)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 0 15px rgba(139, 0, 0, 0.8)); }
        }
        .nav-links {
            display: flex;
            gap: 40px;
            align-items: center;
        }
        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.3s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        .nav-links a:hover {
            color: var(--xre-dark-red);
            text-shadow: 0 0 10px rgba(139, 0, 0, 0.8);
        }
        .neon-btn {
            background: rgba(139, 0, 0, 0.3);
            color: #ffffff !important;
            border: 2px solid var(--xre-dark-red);
            padding: 10px 25px;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }
        .neon-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }
        .neon-btn:hover::before {
            left: 100%;
        }
        .neon-btn:hover {
            background: var(--xre-dark-red);
            border-color: var(--xre-dark-red);
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.8), 0 0 60px rgba(139, 0, 0, 0.4);
            transform: scale(1.05);
            letter-spacing: 3px;
        }
        .hero {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            min-height: 600px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1;
            overflow: hidden;
        }
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://livegigsasia.com/image/p-p-3.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            filter: brightness(0.8) saturate(1.2);
            z-index: 0;
        }
        .smoke-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            overflow: hidden;
            pointer-events: none;
            opacity: 0.5;
        }
        .smoke {
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.04) 0%, transparent 50%);
            filter: blur(60px);
        }
        .smoke:nth-child(1) { top: -30%; left: -30%; animation: smokeFloat1 25s ease-in-out infinite; }
        .smoke:nth-child(2) { top: 10%; right: -30%; animation: smokeFloat2 30s ease-in-out infinite; opacity: 0.6; }
        .smoke:nth-child(3) { bottom: -30%; left: 10%; animation: smokeFloat3 28s ease-in-out infinite; opacity: 0.4; }
        @keyframes smokeFloat1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 3%) scale(1.1); }
        }
        @keyframes smokeFloat2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-5%, -3%) scale(1.05); }
        }
        @keyframes smokeFloat3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(3%, -5%) scale(1.08); }
        }
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.3) 100%);
            z-index: 2;
        }
        .hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 100%;
            padding: 0 20px;
            margin-top: 120px;
        }
        .hero-title {
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-size: clamp(80px, 14vw, 220px);
            font-weight: 400;
            letter-spacing: clamp(8px, 2vw, 20px);
            line-height: 0.85;
            margin-bottom: 40px;
            max-width: 1900px;
            margin-left: auto;
            margin-right: auto;
            text-transform: uppercase;
        }
        .hero-title .gray, .hero-title .red {
            color: #c0c0c0;
            text-shadow: 0 0 30px rgba(192, 192, 192, 0.3);
        }
        .hero-subtitle {
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-size: clamp(22px, 3.5vw, 42px);
            letter-spacing: clamp(4px, 1vw, 10px);
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.9);
            max-width: 1400px;
            margin: 80px auto 0;
            padding: 0 20px;
            line-height: 1.4;
            text-align: center;
        }
        .hero-subtitle .line1, .hero-subtitle .line2, .hero-subtitle .line3 {
            display: block;
            margin-bottom: 0;
        }
        .content-wrapper {
            position: relative;
            z-index: 10;
            margin-top: 100vh;
            background: var(--black);
            min-height: 100vh;
        }
        .artists-section {
            width: 100%;
            padding: 100px 0;
            background: var(--mad-silver);
            position: relative;
        }
        .section-title {
            text-align: center;
            font-size: clamp(36px, 6vw, 72px);
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--black);
            margin-bottom: 20px;
            font-weight: 900;
        }
        .title-underline {
            width: 100px;
            height: 3px;
            background: var(--xre-red);
            margin: 0 auto 60px;
            position: relative;
            overflow: hidden;
        }
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 95%;
            margin: 0 auto;
            padding: 0 20px;
        }
        .artist-card-wrapper { 
            text-align: center; 
            position: relative;
        }
        .artist-card {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 48% !important;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s;
            border: 2px solid transparent;
        }
        .artist-card img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover !important;
            object-position: center;
            filter: brightness(1);
            transition: all 0.4s;
        }
        .artist-card:hover {
            border-color: var(--xre-red);
        }
        .artist-card:hover img { 
            transform: scale(1.05); 
        }
        .artist-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .artist-card:hover .artist-overlay { 
            opacity: 1; 
        }
        .artist-name-below {
            margin-top: 15px;
            font-size: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--black);
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
            font-weight: normal;
        }
        .artist-name-below:hover {
            color: var(--xre-red);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
        }

        .footer-gap {
            height: 0;
            display: none;
        }
        .site-footer {
            background: #000;
            color: #c0c0c0;
            position: relative;
            z-index: 100;
            border-top: none;
        }
        .footer-main {
            padding: 50px 40px 40px;
            position: relative;
            background: #000;
        }
        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
        }
        .footer-contact-left {
            flex: 1;
            text-align: left;
            font-family: 'Courier New', monospace;
        }
        .contact-item {
            margin-bottom: 10px;
            color: #c0c0c0;
            font-size: 13px;
            letter-spacing: 0.5px;
            line-height: 1.5;
        }
        .contact-item a {
            color: #c0c0c0;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: bold;
        }
        .contact-item a:hover {
            color: var(--xre-red);
        }
        .footer-brand {
            flex: 0 0 auto;
            text-align: center;
        }
        .footer-logo {
            font-size: clamp(32px, 6vw, 48px);
            font-weight: 400;
            letter-spacing: 4px;
            line-height: 1;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .footer-logo .xre {
            color: var(--xre-dark-red);
        }
        .footer-logo .booking {
            color: #c0c0c0;
        }
        .social-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
        }
        .social-icon {
            width: 44px;
            height: 44px;
            border: 2px solid #888;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c0c0c0;
            text-decoration: none;
            transition: all 0.3s;
            background: rgba(255,255,255,0.05);
        }
        .social-icon svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }
        .social-icon:hover {
            border-color: var(--xre-red);
            color: var(--xre-red);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255,0,0,0.3);
        }
        .producer-section {
            text-align: center;
        }
        .producer-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }
        .producer-logo {
            height: 35px;
            width: auto;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        .producer-logo:hover {
            opacity: 1;
        }
        .footer-contact-right {
            flex: 1;
            text-align: right;
            font-family: 'Courier New', monospace;
        }
        .footer-bottom {
            background: #111;
            border-top: 1px solid #333;
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .footer-legal {
            display: flex;
            gap: 25px;
        }
        .footer-legal a {
            color: #888;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s;
            font-weight: bold;
        }
        .footer-legal a:hover {
            color: var(--xre-red);
        }
        .copyright {
            color: #777;
            font-size: 11px;
            letter-spacing: 1px;
            font-family: 'Courier New', monospace;
        }

        /* Booking弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: linear-gradient(135deg, #0a0000 0%, #050505 100%);
            border: 2px solid var(--xre-red);
            padding: 40px 35px;
            max-width: 480px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 0 50px rgba(74, 0, 0, 0.5);
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        .modal-close:hover { color: var(--xre-red); transform: scale(1.2); }
        .modal-content h2 {
            font-size: 28px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: #fff;
            text-align: center;
        }
        .modal-content p {
            font-size: 13px;
            color: var(--mad-silver);
            text-align: center;
            margin-bottom: 25px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--mad-silver);
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--xre-red);
            color: #fff;
            font-size: 14px;
            letter-spacing: 1px;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--xre-red);
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.3);
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .modal-content .neon-btn {
            width: 100%;
            margin-top: 10px;
            padding: 14px;
            font-size: 13px;
            background: transparent;
            color: #fff;
            border: 2px solid var(--xre-dark-red);
            cursor: pointer;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .modal-content .neon-btn:hover {
            background: var(--xre-dark-red);
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.5);
        }

        /* BRANDED TOURS区域 */
        .branded-tours-section {
            width: 100%;
            padding: 80px 0 60px 0;
            background: linear-gradient(180deg, var(--mad-silver) 0%, var(--mad-light) 30%, var(--xre-red) 70%, #8b0000 100%);
            position: relative;
        }
        .branded-tours-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            padding: 0 20px;
        }
        .branded-tour-card {
            position: relative;
            background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s ease;
            border: 1px solid rgba(139, 0, 0, 0.3);
            aspect-ratio: 3/4;
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        .branded-tour-card:hover {
            transform: translateY(-10px);
            border-color: rgba(139, 0, 0, 0.8);
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.3);
        }
        .branded-tour-card.active {
            transform: translateY(-5px);
            border-color: rgba(139, 0, 0, 0.8);
        }
        .branded-tour-poster {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            filter: brightness(0.7);
            transition: all 0.4s;
            z-index: 1;
        }
        .branded-tour-card:hover .branded-tour-poster,
        .branded-tour-card.active .branded-tour-poster {
            filter: brightness(1);
            transform: scale(1.05);
        }
        .branded-tour-share {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 36px;
            height: 36px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--xre-dark-red);
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 15;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: auto;
        }
        .branded-tour-card:hover .branded-tour-share,
        .branded-tour-card.active .branded-tour-share {
            opacity: 1;
        }
        .branded-tour-share:hover {
            background: var(--xre-dark-red);
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.8);
            transform: scale(1.1);
        }
        .branded-tour-status {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            padding: 8px 16px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(139, 0, 0, 0.5);
            color: #ffaa00;
            pointer-events: none;
        }
        .branded-tour-content {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 80px 20px 40px;
            z-index: 5;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 40%, rgba(0,0,0,0.6) 70%, rgba(0,0,0,0.8) 100%);
            transition: all 0.4s ease;
            pointer-events: none;
        }
        .branded-tour-card:hover .branded-tour-content,
        .branded-tour-card.active .branded-tour-content {
            background: transparent;
        }
        .branded-tour-name {
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-size: clamp(20px, 2.5vw, 28px);
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(139, 0, 0, 1), 0 2px 4px rgba(0,0,0,0.8);
            line-height: 1.2;
            text-align: center;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .branded-tour-details {
            font-size: 14px;
            color: #c0c0c0;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .branded-tour-venue {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            letter-spacing: 1px;
            margin-bottom: auto;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .branded-tour-card:hover .branded-tour-name,
        .branded-tour-card:hover .branded-tour-details,
        .branded-tour-card:hover .branded-tour-venue,
        .branded-tour-card.active .branded-tour-name,
        .branded-tour-card.active .branded-tour-details,
        .branded-tour-card.active .branded-tour-venue {
            opacity: 0;
            visibility: hidden;
        }
        .branded-tour-btn {
            display: inline-block;
            background: rgba(139, 0, 0, 0.9);
            color: #fff;
            border: 2px solid var(--xre-dark-red);
            padding: 12px 30px;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
            margin-top: auto;
            pointer-events: auto;
            z-index: 20;
        }
        .branded-tour-btn:hover {
            background: var(--xre-dark-red);
            border-color: var(--xre-dark-red);
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.8);
            transform: scale(1.05);
            letter-spacing: 3px;
        }
        .branded-tour-btn.disabled {
            pointer-events: none;
            cursor: default;
            opacity: 0.9;
            background: rgba(139, 0, 0, 0.7);
        }
        .branded-tour-card:hover .branded-tour-btn,
        .branded-tour-card.active .branded-tour-btn {
            opacity: 1 !important;
            visibility: visible !important;
        }
        .branded-tours-load-more {
            text-align: center;
            margin-top: 60px;
            display: none;
        }
        .branded-tours-load-more.visible {
            display: block;
        }
        .branded-tours-load-more .neon-btn {
            background: rgba(139, 0, 0, 0.3);
            color: #fff;
            border: 2px solid var(--xre-dark-red);
            padding: 15px 40px;
            font-size: 14px;
            letter-spacing: 3px;
        }
