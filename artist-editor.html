<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRE BOOKING - 艺人编辑器</title>
    <link rel="icon" type="image/png" href="./images/webtop.png">
    <style>
        :root {
            --xre-red: #ff0000;
            --xre-dark-red: #8b0000;
            --mad-silver: #e8e8e8;
            --black: #050505;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: var(--black);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            text-align: center;
            font-size: 42px;
            letter-spacing: 5px;
            margin-bottom: 10px;
            color: var(--xre-red);
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .editor-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        /* 左侧艺人列表 */
        .sidebar {
            background: #111;
            border: 1px solid var(--xre-dark-red);
            border-radius: 8px;
            padding: 15px;
            height: fit-content;
        }
        .sidebar h3 {
            font-family: Impact, sans-serif;
            font-size: 16px;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: var(--xre-red);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .artist-list {
            max-height: 600px;
            overflow-y: auto;
        }
        .artist-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .artist-item:hover {
            border-color: var(--xre-red);
            background: #222;
        }
        .artist-item.active {
            border-color: var(--xre-red);
            background: rgba(139, 0, 0, 0.2);
        }
        .artist-item-name {
            font-weight: bold;
            font-size: 14px;
        }
        .artist-item-id {
            font-size: 11px;
            color: #666;
        }
        .artist-item-actions {
            display: flex;
            gap: 5px;
        }
        .btn-icon {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            color: #888;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .btn-icon:hover {
            background: var(--xre-dark-red);
            color: #fff;
        }
        .btn-add {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: var(--xre-dark-red);
            color: #fff;
            border: 2px solid var(--xre-red);
            font-family: Impact, sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }
        .btn-add:hover {
            background: var(--xre-red);
            transform: scale(1.02);
        }

        /* 右侧编辑区 */
        .editor-main {
            background: #111;
            border: 1px solid var(--xre-dark-red);
            border-radius: 8px;
            padding: 20px;
        }
        .section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .section:last-child {
            border-bottom: none;
        }
        .section-title {
            font-family: Impact, sans-serif;
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: var(--xre-red);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--xre-red);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: #1a1a1a;
            border: 1px solid #444;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            border-radius: 4px;
            transition: all 0.3s;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--xre-red);
            box-shadow: 0 0 10px rgba(139, 0, 0, 0.3);
        }
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        .form-hint {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
        }

        /* 社交链接 */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .social-input {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 4px;
        }
        .social-input svg {
            width: 18px;
            height: 18px;
            fill: #888;
            flex-shrink: 0;
        }
        .social-input input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 12px;
            padding: 0;
        }
        .social-input input:focus {
            outline: none;
            box-shadow: none;
        }

        /* TOUR DATES */
        .tour-list {
            margin-bottom: 15px;
        }
        .tour-item {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr auto;
            gap: 10px;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 4px;
            margin-bottom: 10px;
            align-items: center;
        }
        .tour-item input {
            background: #222;
            border: 1px solid #555;
            padding: 8px;
            color: #fff;
            font-size: 12px;
            border-radius: 3px;
        }
        .btn-remove {
            width: 30px;
            height: 30px;
            background: transparent;
            border: 1px solid #666;
            color: #888;
            cursor: pointer;
            border-radius: 4px;
            font-size: 18px;
        }
        .btn-remove:hover {
            background: var(--xre-red);
            border-color: var(--xre-red);
            color: #fff;
        }
        .btn-small {
            padding: 8px 16px;
            background: #222;
            border: 1px solid #555;
            color: #fff;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }
        .btn-small:hover {
            border-color: var(--xre-red);
            color: var(--xre-red);
        }

        /* 操作按钮 */
        .actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid var(--xre-dark-red);
        }
        .btn {
            padding: 12px 30px;
            font-family: Impact, sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .btn-secondary {
            background: transparent;
            border: 2px solid #666;
            color: #888;
        }
        .btn-secondary:hover {
            border-color: #999;
            color: #fff;
        }
        .btn-primary {
            background: var(--xre-dark-red);
            border: 2px solid var(--xre-red);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--xre-red);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.5);
        }

        /* JSON 预览 */
        .json-preview {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 15px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .json-preview pre {
            font-size: 12px;
            line-height: 1.5;
            color: #0f0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* 提示信息 */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            background: var(--xre-dark-red);
            border: 2px solid var(--xre-red);
            color: #fff;
            border-radius: 4px;
            font-family: Impact, sans-serif;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .editor-grid {
                grid-template-columns: 1fr;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .social-grid {
                grid-template-columns: 1fr;
            }
            .tour-item {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

        <h1>XRE BOOKING</h1>
        <p class="subtitle">艺人信息编辑器 | Artist Data Editor</p>

            <div class="sidebar">

            <div class="editor-main">

                        <p style="font-size: 12px; margin-top: 10px;">或点击"添加艺人"创建新艺人</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

            netease: '<svg viewBox="0 0 24 24" fill="#c62f2f"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5.93 8.46l-.61 7.76c-.09.87-.63 1.08-1.27 1.08-.26 0-.53-.04-.79-.13l-2.93-.99c-.66-.22-.79-.35-.79-1.07v-4.1c0-.64.23-.96.73-1.11l5.47-1.52c.5-.14.78.08.78.58 0 .13-.04.27-.09.4h.5zm-4.43 3.16l-1.47.49c-.22.07-.36.27-.36.5v2.26c0 .31.24.55.55.55h.01c.08 0 .15-.02.22-.05l1.47-.49c.22-.07.36-.27.36-.5v-2.26c0-.31-.24-.55-.55-.55h-.01c-.08 0-.15.02-.22.05zM7.5 16.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm0-5C6.67 11.5 6 10.83 6 10s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>',
            website: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>'
        };

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('./artists-data.json');
                artistsData = await response.json();
                renderArtistList();
            } catch (error) {
                console.error('加载数据失败:', error);
                showToast('加载数据失败，将创建新文件');
                artistsData = {};
            }
        }

        // 渲染艺人列表
        function renderArtistList() {
            const list = document.getElementById('artistList');
            list.innerHTML = '';

            Object.entries(artistsData).forEach(([id, artist]) => {
                const item = document.createElement('div');
                item.className = 'artist-item' + (id === currentArtistId ? ' active' : '');
                item.innerHTML = `
                    <div>
                        <div class="artist-item-name">${artist.name || '未命名'}</div>
                        <div class="artist-item-id">${id}</div>
                    </div>
                    <div class="artist-item-actions">
                        <button class="btn-icon" onclick="event.stopPropagation(); editArtist('${id}')">✎</button>
                        <button class="btn-icon" onclick="event.stopPropagation(); deleteArtist('${id}')">×</button>
                    </div>
                `;
                item.onclick = () => editArtist(id);
                list.appendChild(item);
            });
        }

        // 编辑艺人
        function editArtist(id) {
            currentArtistId = id;
            const artist = artistsData[id] || {};
            renderArtistList();
            renderEditor(artist);
        }

        // 渲染编辑器
        function renderEditor(artist) {
            const container = document.getElementById('editorContent');

            container.innerHTML = `
                <div class="section">
                    <div class="section-title">基本信息</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>艺人ID（URL标识）</label>
                            <input type="text" id="artistId" value="${currentArtistId || ''}" placeholder="例如: thenoname">
                            <div class="form-hint">只能使用小写字母、数字和连字符</div>
                        </div>
                        <div class="form-group">
                            <label>艺人名称</label>
                            <input type="text" id="artistName" value="${artist.name || ''}" placeholder="例如: THE NONAME">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Hero背景图片</label>
                        <input type="text" id="heroImage" value="${artist.heroImage || ''}" placeholder="./assets/artists/ArtistName.jpg">
                        <div class="form-hint">建议尺寸: 1920x1080 或更高</div>
                    </div>
                    <div class="form-group">
                        <label>艺人简介（支持HTML）</label>
                        <textarea id="bio" placeholder="输入艺人简介...">${artist.bio || ''}</textarea>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">经纪人信息</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>经纪人姓名</label>
                            <input type="text" id="agentName" value="${artist.agent?.name || 'XRE Booking Team'}" placeholder="XRE Booking Team">
                        </div>
                        <div class="form-group">
                            <label>经纪人邮箱</label>
                            <input type="text" id="agentEmail" value="${artist.agent?.email || 'xrebooking@hotmail.com'}" placeholder="xrebooking@hotmail.com">
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">社交媒体链接（不填则不显示）</div>
                    <div class="social-grid">
                        ${Object.entries(socialIcons).map(([key, svg]) => `
                            <div class="social-input">
                                ${svg}
                                <input type="text" id="social_${key}" value="${artist.social?.[key] || ''}" placeholder="${key}">
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">视频链接（不填则不显示VIDEO区域）</div>
                    <div class="form-group">
                        <label>视频URL（支持 YouTube/优酷/B站）</label>
                        <input type="text" id="videoUrl" value="${artist.videoUrl || ''}" placeholder="https://www.youtube.com/watch?v=...">
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">媒体包（不填则不显示MEDIA KIT区域）</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Google Drive 链接</label>
                            <input type="text" id="gdrive" value="${artist.mediaKit?.googleDrive || ''}" placeholder="https://drive.google.com/...">
                        </div>
                        <div class="form-group">
                            <label>百度网盘 链接</label>
                            <input type="text" id="baidu" value="${artist.mediaKit?.baidu || ''}" placeholder="https://pan.baidu.com/...">
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">巡演日期（不填则不显示TOUR DATES区域）</div>
                    <div class="tour-list" id="tourList"></div>
                    <button class="btn-small" onclick="addTourDate()">+ 添加巡演日期</button>
                </div>

                <div class="actions">
                    <button class="btn btn-secondary" onclick="cancelEdit()">取消</button>
                    <button class="btn btn-primary" onclick="saveArtist()">保存艺人</button>
                </div>

                <div class="json-preview">
                    <div style="color: #666; margin-bottom: 10px; font-size: 11px;">JSON 预览:</div>
                    <pre id="jsonPreview">${JSON.stringify(artist, null, 2)}</pre>
                </div>
            `;

            // 渲染巡演日期
            renderTourDates(artist.tourDates || []);

            // 添加输入监听更新预览
            container.querySelectorAll('input, textarea').forEach(input => {
                input.addEventListener('input', updatePreview);
            });
        }

        // 渲染巡演日期
        function renderTourDates(tours) {
            const list = document.getElementById('tourList');
            if (!list) return;

            list.innerHTML = tours.map((tour, index) => `
                <div class="tour-item" data-index="${index}">
                    <input type="text" placeholder="日期 (DD.MM.YYYY)" value="${tour.date || ''}" class="tour-date">
                    <input type="text" placeholder="城市" value="${tour.city || ''}" class="tour-city">
                    <input type="text" placeholder="场地" value="${tour.venue || ''}" class="tour-venue">
                    <input type="text" placeholder="国家" value="${tour.country || ''}" class="tour-country">
                    <input type="text" placeholder="购票链接" value="${tour.ticketUrl || ''}" class="tour-ticket">
                    <button class="btn-remove" onclick="removeTourDate(${index})">×</button>
                </div>
            `).join('');

            updatePreview();
        }

        // 添加巡演日期
        function addTourDate() {
            const tours = getTourDates();
            tours.push({ date: '', city: '', venue: '', country: '', ticketUrl: '' });
            renderTourDates(tours);
        }

        // 删除巡演日期
        function removeTourDate(index) {
            const tours = getTourDates();
            tours.splice(index, 1);
            renderTourDates(tours);
        }

        // 获取巡演日期数据
        function getTourDates() {
            const items = document.querySelectorAll('.tour-item');
            return Array.from(items).map(item => ({
                date: item.querySelector('.tour-date').value,
                city: item.querySelector('.tour-city').value,
                venue: item.querySelector('.tour-venue').value,
                country: item.querySelector('.tour-country').value,
                ticketUrl: item.querySelector('.tour-ticket').value
            }));
        }

        // 更新预览
        function updatePreview() {
            const data = collectFormData();
            const preview = document.getElementById('jsonPreview');
            if (preview) {
                preview.textContent = JSON.stringify(data, null, 2);
            }
        }

        // 收集表单数据
        function collectFormData() {
            const social = {};
            Object.keys(socialIcons).forEach(key => {
                const value = document.getElementById(`social_${key}`)?.value;
                if (value) social[key] = value;
            });

            const mediaKit = {};
            const gdrive = document.getElementById('gdrive')?.value;
            const baidu = document.getElementById('baidu')?.value;
            if (gdrive) mediaKit.googleDrive = gdrive;
            if (baidu) mediaKit.baidu = baidu;

            const data = {
                name: document.getElementById('artistName')?.value || '',
                heroImage: document.getElementById('heroImage')?.value || '',
                bio: document.getElementById('bio')?.value || '',
                agent: {
                    name: document.getElementById('agentName')?.value || 'XRE Booking Team',
                    email: document.getElementById('agentEmail')?.value || 'xrebooking@hotmail.com'
                },
                social: Object.keys(social).length > 0 ? social : undefined,
                videoUrl: document.getElementById('videoUrl')?.value || undefined,
                mediaKit: Object.keys(mediaKit).length > 0 ? mediaKit : undefined,
                tourDates: getTourDates().filter(t => t.date || t.city)
            };

            // 移除空数组
            if (data.tourDates.length === 0) delete data.tourDates;

            return data;
        }

        // 保存艺人
        function saveArtist() {
            const newId = document.getElementById('artistId').value.trim().toLowerCase();

            if (!newId) {
                showToast('请输入艺人ID');
                return;
            }

            if (!/^[a-z0-9-]+$/.test(newId)) {
                showToast('艺人ID只能使用小写字母、数字和连字符');
                return;
            }

            const data = collectFormData();

            if (!data.name) {
                showToast('请输入艺人名称');
                return;
            }

            // 如果ID改变，删除旧数据
            if (currentArtistId && currentArtistId !== newId) {
                delete artistsData[currentArtistId];
            }

            artistsData[newId] = data;
            currentArtistId = newId;

            // 保存到本地存储（实际使用时需要后端支持）
            localStorage.setItem('artistsData', JSON.stringify(artistsData));

            renderArtistList();
            showToast('保存成功！请复制下方JSON到 artists-data.json 文件');

            // 显示完整的JSON数据供复制
            console.log(JSON.stringify(artistsData, null, 2));
        }

        // 添加新艺人
        function addNewArtist() {
            currentArtistId = null;
            renderArtistList();
            renderEditor({});
        }

        // 删除艺人
        function deleteArtist(id) {
            if (!confirm(`确定要删除艺人 "${artistsData[id]?.name || id}" 吗？`)) return;

            delete artistsData[id];
            if (currentArtistId === id) {
                currentArtistId = null;
                document.getElementById('editorContent').innerHTML = `
                    <div style="text-align: center; padding: 60px; color: #666;">
                        <p>请选择左侧艺人进行编辑</p>
                    </div>
                `;
            }
            renderArtistList();
            showToast('已删除');
        }

        // 取消编辑
        function cancelEdit() {
            currentArtistId = null;
            renderArtistList();
            document.getElementById('editorContent').innerHTML = `
                <div style="text-align: center; padding: 60px; color: #666;">
                    <p>请选择左侧艺人进行编辑</p>
                </div>
            `;
        }

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 初始化
        loadData();
    </script>
</body>
</html>
